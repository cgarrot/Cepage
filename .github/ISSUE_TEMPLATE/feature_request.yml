name: Feature request
description: Propose a new capability or product improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: Describe the user or developer pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Optional: list alternatives, trade-offs, or prior art.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      placeholder: Screenshots, docs links, examples, or implementation ideas.
    validations:
      required: false
